[[redirects]]
  from = "https://rajathkiran.netlify.app/*"
  to = "https://rajathkiran.me/:splat"
  status = 301
  force = true

# Personalized Recruiter Links
[[redirects]]
  from = "/hire/cloud"
  to = "/index.html?env=mission-control&recruiter=true"
  status = 200
[[redirects]]
  from = "/hire/ml"
  to = "/index.html?env=neural-nexus&recruiter=true"
  status = 200
[[redirects]]
  from = "/hire/fullstack"
  to = "/index.html?env=project-foundry&recruiter=true"
  status = 200
[[redirects]]
  from = "/hire/ai"
  to = "/index.html?env=neural-nexus&recruiter=true"
  status = 200
[[redirects]]
  from = "/hire/research"
  to = "/index.html?env=research-lab&recruiter=true"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache-Control Headers
[[headers]]
  for = "/assets/images/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/resumes/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/llm.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
