<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resume — Rajath Kiran A</title>
  <link rel="icon" href="./assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="./assets/css/style.min.css">
  <link rel="stylesheet" href="./assets/css/resume-viewer.css">
</head>
<body class="viewer-root">

  <div class="viewer-toolbar" role="toolbar" aria-hidden="false">
    <div class="toolbar-left">
      <a class="btn btn-ghost" href="index.html" id="backBtn" title="Back to portfolio"><span class="btn-icon">←</span><span class="btn-text">Back</span></a>
    </div>

    <div class="toolbar-center">
      <button id="prevPage" class="btn btn-stack" aria-label="Previous page"><span class="btn-icon">◀</span><span class="btn-text">Prev</span></button>
      <span id="pageInfo">Page 1 / 1</span>
      <button id="nextPage" class="btn btn-stack" aria-label="Next page"><span class="btn-icon">▶</span><span class="btn-text">Next</span></button>

      <div class="spacer"></div>

      <button id="zoomOut" class="btn btn-stack" aria-label="Zoom out"><span class="btn-icon">−</span><span class="btn-text">Zoom-</span></button>
      <span id="zoomPct">100%</span>
      <button id="zoomIn" class="btn btn-stack" aria-label="Zoom in"><span class="btn-icon">+</span><span class="btn-text">Zoom+</span></button>

      <button id="fitBtn" class="btn btn-stack" aria-label="Fit to width" title="Fit to width"><span class="btn-icon">⤢</span><span class="btn-text">Fit</span></button>
      <button id="rotateBtn" class="btn btn-stack" aria-label="Rotate" title="Rotate"><span class="btn-icon">⟳</span><span class="btn-text">Rotate</span></button>

      <button id="downloadBtn" class="btn btn-stack" title="Download PDF"><span class="btn-icon">⬇</span><span class="btn-text">Download</span></button>
      <button id="shareBtn" class="btn btn-stack" title="Copy link"><span class="btn-icon">🔗</span><span class="btn-text">Share</span></button>
    </div>

  </div>

  <main class="viewer-main">
    <div id="canvasContainer" class="canvas-container">
      <canvas id="pdfCanvas" class="pdf-canvas" role="img" aria-label="Resume PDF canvas"></canvas>
      <div id="skeleton" class="skeleton" aria-hidden="true"></div>
    </div>
  </main>

  <div id="progressBar" class="progress-bar" aria-hidden="true"><div class="progress"></div></div>

  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
  <script src="./assets/js/resume-viewer.js" defer></script>
</body>
</html>
